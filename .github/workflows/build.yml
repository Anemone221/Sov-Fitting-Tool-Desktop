name: Build

on:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive # renderer/core live in the `react` submodule

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 24.16 silently breaks electron's extract-zip unpack (binary
          # never lands); 22 LTS is what the Electron toolchain is tested against.
          node-version: 22
          cache: npm

      - name: Install dependencies
        # --foreground-scripts surfaces dependency lifecycle output (notably
        # electron's own postinstall/install.js) so we can see why the Electron
        # binary install isn't completing during npm i.
        run: npm i --foreground-scripts

      - name: Diagnose electron install
        if: always()
        shell: bash
        run: |
          set +e
          echo "=== root node_modules/electron/dist ==="
          ls -la node_modules/electron/dist || echo "(no dist)"
          echo "=== path.txt ==="
          cat node_modules/electron/path.txt || echo "(no path.txt)"
          echo "=== react/node_modules/electron (submodule theory) ==="
          ls -la react/node_modules/electron 2>/dev/null || echo "(none - submodule deps not installed)"
          echo "=== free space ==="
          df -h . || true
          echo "=== extract-zip behaviour test (download + extract to dist-test) ==="
          node -e "const p=require('path'),fs=require('fs');const ed=p.dirname(require.resolve('electron/package.json'));const {version}=require('electron/package.json');const {downloadArtifact}=require(require.resolve('@electron/get',{paths:[ed]}));const extract=require(require.resolve('extract-zip',{paths:[ed]}));(async()=>{const zip=await downloadArtifact({version,artifactName:'electron',platform:process.platform,arch:process.arch});console.log('zip',zip,fs.statSync(zip).size,'bytes');const d=p.join(ed,'dist-test');fs.rmSync(d,{recursive:true,force:true});let n=0;await extract(zip,{dir:d,onEntry:e=>{n++;}});console.log('entries extracted:',n,'top-level files:',fs.readdirSync(d).length);})().then(()=>console.log('EXTRACT OK')).catch(e=>{console.error('EXTRACT ERROR:',e&&e.stack||e);process.exit(1)})"
          echo "extract test exit code: $?"

      - name: Generate Seed Database
        run: npm run seed

      - name: Build and package
        run: npm run package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: |
            dist/*.exe
            dist/*.zip
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive # renderer/core live in the `react` submodule

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 24.16 silently breaks electron's extract-zip unpack (binary
          # never lands); 22 LTS is what the Electron toolchain is tested against.
          node-version: 22
          cache: npm

      - name: Install dependencies
        # --foreground-scripts surfaces dependency lifecycle output (notably
        # electron's own postinstall/install.js) so we can see why the Electron
        # binary install isn't completing during npm i.
        run: npm i --foreground-scripts

      - name: Diagnose electron install
        if: always()
        shell: bash
        run: |
          set +e
          echo "=== root node_modules/electron/dist ==="
          ls -la node_modules/electron/dist || echo "(no dist)"
          echo "=== path.txt ==="
          cat node_modules/electron/path.txt || echo "(no path.txt)"
          echo "=== react/node_modules/electron (submodule theory) ==="
          ls -la react/node_modules/electron 2>/dev/null || echo "(none - submodule deps not installed)"
          echo "=== free space ==="
          df -h . || true
          echo "=== extract-zip behaviour test (download + extract to dist-test) ==="
          node -e "const p=require('path'),fs=require('fs');const ed=p.dirname(require.resolve('electron/package.json'));const {version}=require('electron/package.json');const {downloadArtifact}=require(require.resolve('@electron/get',{paths:[ed]}));const extract=require(require.resolve('extract-zip',{paths:[ed]}));(async()=>{const zip=await downloadArtifact({version,artifactName:'electron',platform:process.platform,arch:process.arch});console.log('zip',zip,fs.statSync(zip).size,'bytes');const d=p.join(ed,'dist-test');fs.rmSync(d,{recursive:true,force:true});let n=0;await extract(zip,{dir:d,onEntry:e=>{n++;}});console.log('entries extracted:',n,'top-level files:',fs.readdirSync(d).length);})().then(()=>console.log('EXTRACT OK')).catch(e=>{console.error('EXTRACT ERROR:',e&&e.stack||e);process.exit(1)})"
          echo "extract test exit code: $?"

      - name: Generate Seed Database
        run: npm run seed

      - name: Build and package
        run: npm run package:mac:unsigned

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    env:
      ELECTRON_DISABLE_SANDBOX: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive # renderer/core live in the `react` submodule

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 24.16 silently breaks electron's extract-zip unpack (binary
          # never lands); 22 LTS is what the Electron toolchain is tested against.
          node-version: 22
          cache: npm

      - name: Install dependencies
        # --foreground-scripts surfaces dependency lifecycle output (notably
        # electron's own postinstall/install.js) so we can see why the Electron
        # binary install isn't completing during npm i.
        run: npm i --foreground-scripts

      - name: Diagnose electron install
        if: always()
        shell: bash
        run: |
          set +e
          echo "=== root node_modules/electron/dist ==="
          ls -la node_modules/electron/dist || echo "(no dist)"
          echo "=== path.txt ==="
          cat node_modules/electron/path.txt || echo "(no path.txt)"
          echo "=== react/node_modules/electron (submodule theory) ==="
          ls -la react/node_modules/electron 2>/dev/null || echo "(none - submodule deps not installed)"
          echo "=== free space ==="
          df -h . || true
          echo "=== extract-zip behaviour test (download + extract to dist-test) ==="
          node -e "const p=require('path'),fs=require('fs');const ed=p.dirname(require.resolve('electron/package.json'));const {version}=require('electron/package.json');const {downloadArtifact}=require(require.resolve('@electron/get',{paths:[ed]}));const extract=require(require.resolve('extract-zip',{paths:[ed]}));(async()=>{const zip=await downloadArtifact({version,artifactName:'electron',platform:process.platform,arch:process.arch});console.log('zip',zip,fs.statSync(zip).size,'bytes');const d=p.join(ed,'dist-test');fs.rmSync(d,{recursive:true,force:true});let n=0;await extract(zip,{dir:d,onEntry:e=>{n++;}});console.log('entries extracted:',n,'top-level files:',fs.readdirSync(d).length);})().then(()=>console.log('EXTRACT OK')).catch(e=>{console.error('EXTRACT ERROR:',e&&e.stack||e);process.exit(1)})"
          echo "extract test exit code: $?"

      - name: Generate Seed Database
        run: xvfb-run --auto-servernum npm run seed

      - name: Build and package
        run: npm run package:linux:unsigned

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: |
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Get current time
        uses: josStorer/get-current-time@v2
        id: current-time
        with:
          format: YYYYMMDD-HHmm
          utcOffset: "+00:00"

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: dist

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-macos
          path: dist

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-linux
          path: dist

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          name: ${{ steps.current-time.outputs.formattedTime }}-BETA
          tag_name: ${{ steps.current-time.outputs.formattedTime }}-BETA
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ github.token }}
